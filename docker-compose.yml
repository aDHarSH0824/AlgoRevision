version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: dsa-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - dsa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dsa-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/algorevision
      - JWT_SECRET=production_grade_dsa_revision_hub_jwt_secret_token_12345
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    networks:
      - dsa-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dsa-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - PORT=3000
      - NODE_ENV=production
    networks:
      - dsa-network

networks:
  dsa-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
